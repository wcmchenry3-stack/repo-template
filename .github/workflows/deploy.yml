name: Deploy

on:
  push:
    branches: [main]

# ─────────────────────────────────────────────────────────────────
# Requires RENDER_API_KEY and SITE_URL secrets set in repo settings.
# Get service IDs from: https://api.render.com/v1/services
# or from the Render dashboard URL: /web/srv-XXXXXXXXX
# ─────────────────────────────────────────────────────────────────

